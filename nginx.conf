server {
    listen 80;
    server_name _;

    # Serve the React SPA
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* and /health to the sidecar
    location /api/ {
        proxy_pass         http://nexa-sidecar:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Forward cookies so session auth works
        proxy_pass_header  Set-Cookie;
    }

    location /health {
        proxy_pass http://nexa-sidecar:8080/health;
    }

    location /dev {
        proxy_pass http://nexa-sidecar:8080/dev;
    }

    # SPA fallback – any unknown path returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
