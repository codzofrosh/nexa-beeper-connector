# conduwuit (Conduit fork) configuration for Nexa
# Mounted into the container at /etc/conduit.toml

[global]
server_name            = "localhost"
database_backend       = "rocksdb"
database_path          = "/var/lib/matrix-conduit"
port                   = 6167
address                = "0.0.0.0"
max_request_size       = 20000000
allow_registration     = true
allow_federation       = false
allow_encryption       = true
allow_room_creation    = true
allow_unstable_room_versions = true
trusted_servers        = []
log                    = "warn"

# Appservice registrations (mautrix-whatsapp)
# File is generated by: python bridge/auth/setup.py
appservice_config_files = ["/etc/whatsapp-registration.yaml"]
