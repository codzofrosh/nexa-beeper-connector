# Dendrite Matrix homeserver configuration for Nexa
# Mounted at /etc/dendrite/dendrite.yaml in the container

version: 2

global:
  server_name: localhost
  private_key: /var/lib/dendrite/matrix_key.pem
  key_validity_period: 168h0m0s
  database:
    connection_string: postgres://dendrite:itsasecret@postgres/dendrite?sslmode=disable
    max_open_conns: 90
    max_idle_conns: 5
    conn_max_lifetime: -1
  jetstream:
    storage_path: /var/lib/dendrite/
  cache:
    max_size_estimated: 1gb
    max_age: 1h
  trusted_third_party_id_servers: []
  disable_federation: true

app_service_api:
  disable_tls_validation: false
  config_files:
    - /etc/dendrite/whatsapp-registration.yaml

client_api:
  registration_disabled: false
  guests_disabled: true
  enable_registration_captcha: false
  recaptcha_public_key: ""
  recaptcha_private_key: ""
  recaptcha_bypass_secret: ""

media_api:
  base_path: /var/lib/dendrite/media_store
  max_file_size_bytes: 10485760
  dynamic_thumbnails: false

sync_api:
  search:
    enabled: false

room_server: {}

federation_api:
  send_max_retries: 16
  disable_tls_validation: false
  prefer_direct_fetch: false
  key_perspectives: []

user_api:
  bcrypt_cost: 10
  auto_join_rooms: []

logging:
  - type: std
    level: warn
