version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# Nexa — self-contained stack
#
# Services
#   conduit            Matrix homeserver (lightweight, no Beeper dependency)
#   mautrix-whatsapp   WhatsApp ↔ Matrix bridge
#   nexa-sidecar       AI classification + onboarding API
#
# First-time setup
#   python bridge/auth/setup.py
#   docker-compose up -d
#
# User onboarding (handled by sidecar API — no manual steps)
#   POST /api/onboard/whatsapp/start  →  QR code
#   GET  /api/onboard/whatsapp/status/{session_id}  →  "connected"
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Matrix homeserver (Conduit) ──────────────────────────────────────────
  conduit:
    image: matrixconduit/matrix-conduit:latest
    container_name: nexa-matrix
    restart: unless-stopped
    environment:
      CONDUIT_SERVER_NAME:          "${MATRIX_SERVER_NAME:-localhost}"
      CONDUIT_DATABASE_BACKEND:     "rocksdb"
      CONDUIT_DATABASE_PATH:        "/var/lib/matrix-conduit"
      CONDUIT_PORT:                 "6167"
      CONDUIT_MAX_REQUEST_SIZE:     "20000000"
      CONDUIT_ALLOW_REGISTRATION:   "true"       # setup.py creates accounts
      CONDUIT_ALLOW_FEDERATION:     "false"       # private, no federation
      CONDUIT_ALLOW_ENCRYPTION:     "true"
      CONDUIT_ALLOW_ROOM_CREATION:  "true"
      CONDUIT_ALLOW_UNSTABLE_ROOM_VERSIONS: "true"
      CONDUIT_TRUSTED_SERVERS:      "[]"
      CONDUIT_LOG:                  "warn,rocket::launch=info,_=off,sled=off"
      # Appservice registration for mautrix-whatsapp
      # File is generated by: python bridge/auth/setup.py
      CONDUIT_APPSERVICE_CONFIG_FILES: "/appservices/whatsapp-registration.yaml"
    volumes:
      - conduit_data:/var/lib/matrix-conduit
      # setup.py writes the registration file here; conduit reads it on start
      - ./bridge/whatsapp:/appservices
    ports:
      - "6167:6167"
    networks:
      - nexa-network

  # ── mautrix-whatsapp bridge ──────────────────────────────────────────────
  mautrix-whatsapp:
    image: dock.mau.dev/mautrix/whatsapp:latest
    container_name: nexa-whatsapp-bridge
    restart: unless-stopped
    depends_on:
      - conduit
    volumes:
      - ./bridge/whatsapp/config.yaml:/data/config.yaml
      - whatsapp_data:/data
    networks:
      - nexa-network

  # ── Nexa sidecar (AI + API) ───────────────────────────────────────────────
  nexa-sidecar:
    build: .
    container_name: nexa-sidecar
    restart: unless-stopped
    depends_on:
      - conduit
      - mautrix-whatsapp
    environment:
      # Homeserver — internal Docker address
      MATRIX_HOMESERVER:     "http://conduit:6167"
      MATRIX_SERVER_NAME:    "${MATRIX_SERVER_NAME:-localhost}"
      MATRIX_USER:           "${MATRIX_USER}"
      MATRIX_ACCESS_TOKEN:   "${MATRIX_ACCESS_TOKEN}"

      # Bridge bot (created by mautrix-whatsapp on first run)
      WHATSAPP_BRIDGE_BOT:   "@whatsappbot:${MATRIX_SERVER_NAME:-localhost}"

      # Sidecar config
      ENABLE_EXECUTOR:  "1"
      LOG_LEVEL:        "INFO"
      SQLITE_PATH:      "/data/nexa.db"
      DB_PATH:          "/data/nexa.db"
      SIDECAR_URL:      "http://localhost:8080"

      # AI (optional — falls back to rule-based if not set)
      OLLAMA_URL:   "${OLLAMA_URL:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.2:1b}"
    ports:
      - "8080:8080"
    volumes:
      - nexa_data:/data
    networks:
      - nexa-network
    command: >
      uvicorn sidecar.main:app --host 0.0.0.0 --port 8080 --workers 1

volumes:
  nexa_data:
  conduit_data:
  whatsapp_data:

networks:
  nexa-network:
    driver: bridge
