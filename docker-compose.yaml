version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# Nexa — self-contained stack
#
# Services
#   conduit            Synapse Matrix homeserver
#   mautrix-whatsapp   WhatsApp ↔ Matrix bridge
#   mautrix-linkedin   LinkedIn ↔ Matrix bridge
#   nexa-sidecar       AI classification + onboarding API
#   nexa-frontend      React UI (nginx on port 80)
#
# First-time setup
#   python bridge/auth/setup.py
#   docker-compose up -d
#
# UI: http://localhost (or http://<EC2-IP>)
# API: http://localhost/api  (proxied by nginx to sidecar:8080)
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Matrix homeserver (Synapse) ──────────────────────────────────────────
  conduit:
    image: ghcr.io/element-hq/synapse:latest
    container_name: nexa-matrix
    restart: unless-stopped
    environment:
      SYNAPSE_CONFIG_PATH: /config/homeserver.yaml
      # Run as root (uid 0) so Synapse can write signing key + DB to the
      # named volume whose root directory is owned by root:root 755.
      # Acceptable for a local, single-user dev stack.
      UID: "0"
      GID: "0"
    volumes:
      # Config files in /config (separate from /data) to avoid write-permission conflicts
      # on Windows Docker named volumes when mixing :ro file mounts and writable volumes.
      - ./bridge/synapse/homeserver.yaml:/config/homeserver.yaml:ro
      - ./bridge/synapse/logging.yaml:/config/logging.yaml:ro
      - ./bridge/whatsapp/whatsapp-registration.yaml:/config/whatsapp-registration.yaml:ro
      - ./bridge/linkedin/linkedin-registration.yaml:/config/linkedin-registration.yaml:ro
      # Data volume — fully writable, Synapse stores DB / signing key / media here
      - synapse_data:/data
    ports:
      - "6167:8008"
    networks:
      - nexa-network

  # ── mautrix-whatsapp bridge ──────────────────────────────────────────────
  mautrix-whatsapp:
    image: dock.mau.dev/mautrix/whatsapp:latest
    container_name: nexa-whatsapp-bridge
    restart: unless-stopped
    depends_on:
      - conduit
    volumes:
      - ./bridge/whatsapp/config.yaml:/data/config.yaml:ro
      - whatsapp_data:/data
    networks:
      - nexa-network

  # ── mautrix-linkedin bridge ───────────────────────────────────────────────
  mautrix-linkedin:
    image: dock.mau.dev/mautrix/linkedin:latest
    container_name: nexa-linkedin-bridge
    restart: unless-stopped
    depends_on:
      - conduit
    volumes:
      - ./bridge/linkedin/config.yaml:/data/config.yaml:ro
      - linkedin_data:/data
    networks:
      - nexa-network

  # ── Nexa sidecar (AI + API) ───────────────────────────────────────────────
  nexa-sidecar:
    build: .
    container_name: nexa-sidecar
    restart: unless-stopped
    depends_on:
      - conduit
      - mautrix-whatsapp
    environment:
      # Homeserver — internal Docker address
      MATRIX_HOMESERVER:     "http://conduit:8008"
      MATRIX_SERVER_NAME:    "${MATRIX_SERVER_NAME:-localhost}"
      MATRIX_USER:           "${MATRIX_USER}"
      MATRIX_ACCESS_TOKEN:   "${MATRIX_ACCESS_TOKEN}"

      # Bridge bots (created by their respective bridges on first run)
      WHATSAPP_BRIDGE_BOT:   "@whatsappbot:${MATRIX_SERVER_NAME:-localhost}"
      LINKEDIN_BRIDGE_BOT:   "@linkedinbot:${MATRIX_SERVER_NAME:-localhost}"

      # Sidecar config
      ENABLE_EXECUTOR:  "1"
      LOG_LEVEL:        "INFO"
      SQLITE_PATH:      "/data/nexa.db"
      DB_PATH:          "/data/nexa.db"
      SIDECAR_URL:      "http://localhost:8080"

      # OAuth (optional — omit to disable provider buttons on the login page)
      GOOGLE_CLIENT_ID:     "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GITHUB_CLIENT_ID:     "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
      OAUTH_REDIRECT_BASE_URL: "${OAUTH_REDIRECT_BASE_URL:-http://localhost:8080}"

      # CORS — allow nginx frontend origin
      ALLOWED_ORIGINS: "http://localhost,http://localhost:80,http://${EC2_PUBLIC_IP:-localhost}"

      # AI (optional — falls back to rule-based if not set)
      OLLAMA_URL:   "${OLLAMA_URL:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.2:1b}"
    ports:
      - "8080:8080"
    volumes:
      - nexa_data:/data
    networks:
      - nexa-network
    command: >
      uvicorn sidecar.main:app --host 0.0.0.0 --port 8080 --workers 1

  # ── React frontend (nginx) ────────────────────────────────────────────────
  nexa-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexa-frontend
    restart: unless-stopped
    depends_on:
      - nexa-sidecar
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - nexa-network

volumes:
  nexa_data:
  synapse_data:
  whatsapp_data:
  linkedin_data:

networks:
  nexa-network:
    driver: bridge
